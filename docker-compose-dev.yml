# 로컬에서 일부 모듈을 IDE/터미널로 직접 실행할 때 사용하는 override.
# 예: docker compose -f docker-compose-local.yml -f docker-compose-dev.yml up -d
# 직접 실행할 컨테이너는 stop으로 내리고, Gateway는 host.docker.internal의 앱으로 라우팅한다.

services:
  gateway-service:
    environment:
      IAM_SERVICE_URL: http://host.docker.internal:${IAM_HOST_PORT:-8181}
      STOP_SERVICE_URL: http://host.docker.internal:${STOP_HOST_PORT:-8182}
      RESERVATION_SERVICE_URL: http://host.docker.internal:${RESERVATION_HOST_PORT:-8183}
