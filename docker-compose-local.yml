services:
  database:
    image: postgres:18.3
    container_name: msa-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: default
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --lc-collate=C --lc-ctype=C'
    ports:
      - "15433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8.1.6
    container_name: msa-valkey
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "valkey-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  iam-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: iam
    container_name: msa-iam
    ports:
      - "8181:8181"
      - "18181:18181"
    depends_on:
      database:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SPRING_DATASOURCE_URL=jdbc:postgresql://database:5432/default
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - REDIS_HOST=valkey
      - JWT_SECRET=this-is-a-very-long-secret-key-for-hmac-sha256-algorithm-32chars
      - JAVA_TOOL_OPTIONS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:18181
      - LOGGING_LEVEL_COM_HIG_AUTH=DEBUG

  stop-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: stop
    container_name: msa-stop
    ports:
      - "8182:8182"
      - "18182:18182"
    depends_on:
      database:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SPRING_DATASOURCE_URL=jdbc:postgresql://database:5432/default
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - JWT_SECRET=this-is-a-very-long-secret-key-for-hmac-sha256-algorithm-32chars
      - JAVA_TOOL_OPTIONS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:18182
      - LOGGING_LEVEL_COM_HIG_RESERVATION=DEBUG

  reservation-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: reservation
    container_name: msa-reservation
    ports:
      - "8183:8183"
      - "18183:18183"
    depends_on:
      database:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SPRING_DATASOURCE_URL=jdbc:postgresql://database:5432/default
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - JWT_SECRET=this-is-a-very-long-secret-key-for-hmac-sha256-algorithm-32chars
      - JAVA_TOOL_OPTIONS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:18183
      - LOGGING_LEVEL_COM_HIG_RESERVATION=DEBUG

  gateway-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: gateway
    container_name: msa-gateway
    ports:
      - "8080:8080"
      - "18080:18080"
    depends_on:
      - iam-service
      - reservation-service
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - REDIS_HOST=valkey
      - JWT_SECRET=this-is-a-very-long-secret-key-for-hmac-sha256-algorithm-32chars
      - JAVA_TOOL_OPTIONS=-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:18080
      - LOGGING_LEVEL_COM_HIG_GATEWAY=DEBUG
      # 서비스 라우팅 URL — Docker 네트워크 내 기본값
      # 로컬 개발 시 docker-compose-dev.yml override 파일로 host.docker.internal 전환
      - IAM_SERVICE_URL=http://iam-service:8181
      - STOP_SERVICE_URL=http://stop-service:8182
      - RESERVATION_SERVICE_URL=http://reservation-service:8183

volumes:
  postgres_data: