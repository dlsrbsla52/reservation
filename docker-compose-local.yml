# 로컬 전체 스택 실행용 compose.
# 운영 compose와 같은 토폴로지를 유지하되 DB/Valkey/하위 서비스/디버그 포트를 호스트에 노출한다.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "3"

x-local-app-common: &local-app-common
  logging: *default-logging
  environment: &local-app-env
    SPRING_PROFILES_ACTIVE: local
    DB_HOST: database
    DB_PORT: 5432
    DB_NAME: ${POSTGRES_DB:-default}
    DB_USERNAME: ${POSTGRES_USER:-postgres}
    DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    JWT_SECRET: ${JWT_SECRET:-this-is-a-very-long-secret-key-for-hmac-sha256-algorithm-32chars}
    REDIS_HOST: valkey
    REDIS_PORT: 6379
    COOKIE_SECURE: "false"
    CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN:-http://localhost:3000}
    IAM_SERVICE_URL: http://iam-service:8181
    STOP_SERVICE_URL: http://stop-service:8182
    RESERVATION_SERVICE_URL: http://reservation-service:8183
    # APM(OTLP) — 컨테이너 내부에서는 alloy 서비스명으로 push
    OTLP_TRACES_ENDPOINT: http://alloy:4318/v1/traces
    OTLP_METRICS_ENDPOINT: http://alloy:4318/v1/metrics
    # 로컬은 전량 수집(1.0)해 모든 트레이스 확인
    OTLP_TRACE_SAMPLING: ${OTLP_TRACE_SAMPLING:-1.0}
    # 관측성 스택 미가동 시 OTEL_ENABLED=false로 export 시도/로그 노이즈 제거
    OTEL_ENABLED: ${OTEL_ENABLED:-true}

services:
  database:
    image: postgres:18.3
    container_name: msa-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-default}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${POSTGRES_HOST_PORT:-15433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging: *default-logging

  valkey:
    image: valkey/valkey:8.1.6
    container_name: msa-valkey
    command: ["valkey-server", "--appendonly", "yes"]
    ports:
      - "${VALKEY_HOST_PORT:-6379}:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging: *default-logging

  iam-service:
    <<: *local-app-common
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: iam
    container_name: msa-iam
    ports:
      - "${IAM_HOST_PORT:-8181}:8181"
      - "${IAM_DEBUG_PORT:-18181}:18181"
    environment:
      <<: *local-app-env
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:18181"
      LOGGING_LEVEL_COM_HIG_AUTH: DEBUG
    depends_on:
      database:
        condition: service_healthy
      valkey:
        condition: service_healthy

  stop-service:
    <<: *local-app-common
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: stop
    container_name: msa-stop
    ports:
      - "${STOP_HOST_PORT:-8182}:8182"
      - "${STOP_DEBUG_PORT:-18182}:18182"
    environment:
      <<: *local-app-env
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:18182"
      LOGGING_LEVEL_COM_HIG_RESERVATION: DEBUG
    depends_on:
      database:
        condition: service_healthy

  reservation-service:
    <<: *local-app-common
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: reservation
    container_name: msa-reservation
    ports:
      - "${RESERVATION_HOST_PORT:-8183}:8183"
      - "${RESERVATION_DEBUG_PORT:-18183}:18183"
    environment:
      <<: *local-app-env
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:18183"
      LOGGING_LEVEL_COM_HIG_RESERVATION: DEBUG
    depends_on:
      database:
        condition: service_healthy

  gateway-service:
    <<: *local-app-common
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: gateway
    container_name: msa-gateway
    ports:
      - "${GATEWAY_HOST_PORT:-8080}:8080"
      - "${GATEWAY_DEBUG_PORT:-18080}:18080"
    environment:
      <<: *local-app-env
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:18080"
      LOGGING_LEVEL_COM_HIG_GATEWAY: DEBUG
    depends_on:
      valkey:
        condition: service_healthy
      iam-service:
        condition: service_started
      stop-service:
        condition: service_started
      reservation-service:
        condition: service_started

  loki:
    image: grafana/loki:3.0.0
    container_name: msa-loki
    # 관측성 스택은 opt-in — 기본 `up`에서는 뜨지 않는다. 켜기: --profile observability
    profiles: ["observability"]
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./observability/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    expose:
      - "3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 -O- http://localhost:3100/ready | grep -q ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging

  # 분산 트레이스 백엔드 (monolithic). 3200 포트를 호스트에 노출해 디버깅 편의 제공.
  tempo:
    image: grafana/tempo:2.7.0
    container_name: msa-tempo
    profiles: ["observability"]
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    ports:
      - "${TEMPO_HOST_PORT:-3200}:3200"
    depends_on:
      prometheus:
        condition: service_started
    logging: *default-logging

  # 메트릭 백엔드. 9090 포트를 호스트에 노출해 PromQL 직접 확인 가능.
  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: msa-prometheus
    profiles: ["observability"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver # OTLP push 경로(/api/v1/write) 활성화
      - --enable-feature=exemplar-storage # 메트릭↔트레이스 exemplar 연결
      - --storage.tsdb.retention.time=7d
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    logging: *default-logging

  alloy:
    image: grafana/alloy:v1.16.3
    container_name: msa-alloy
    profiles: ["observability"]
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy_data:/var/lib/alloy/data
    ports:
      # 호스트(IntelliJ 등)에서 앱을 직접 실행할 때 localhost:4318로 OTLP push 가능하도록 노출
      - "${ALLOY_OTLP_GRPC_PORT:-4317}:4317"
      - "${ALLOY_OTLP_HTTP_PORT:-4318}:4318"
    # tempo/prometheus는 하드 의존에서 제외 — "로그만" 부분 기동을 위해.
    depends_on:
      loki:
        condition: service_healthy
    logging: *default-logging

  grafana:
    image: grafana/grafana:11.0.0
    container_name: msa-grafana
    profiles: ["observability"]
    ports:
      - "${GRAFANA_HOST_PORT:-3300}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy
    logging: *default-logging

volumes:
  postgres_data:
  valkey_data:
  loki_data:
  grafana_data:
  alloy_data:
  tempo_data:
  prometheus_data:
