server:
  port: 8181

spring:
  application:
    name: iam-service # OTel service.name + 로그 service 라벨 (compose 서비스명과 일치)
  main:
    allow-bean-definition-overriding: true
  datasource:
    hikari:
      # 단일 EC2/Aurora 커넥션 절약 — 기존 20 → 10 (env로 override 가능)
      maximum-pool-size: ${DB_POOL_SIZE:10}
    url: "jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:15433}/${DB_NAME:default}?schema=auth"
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driverClassName: "org.postgresql.Driver"
  liquibase:
    enabled: true
    changeLog: /db/changelog/db.changelog-master.xml
    parameters:
      log-level: FINE
  docker:
    compose:
      # noinspection SpringBootApplicationYaml
      file: ./compose.yaml
  jackson:
    default-property-inclusion: NON_NULL
  threads:
    virtual: # 기본 Thread를 Virtual Thread 설정
      enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# Actuator — 런타임 로그레벨 토글(무재배포)에 사용. 응답 본문 로깅을 일시적으로 켜려면:
#   POST /actuator/loggers/com.media.bus.common.logging.AccessLoggingFilter  body={"configuredLevel":"DEBUG"}
#   원복: 같은 경로에 {"configuredLevel":"INFO"} (또는 null)
# 서비스 포트는 내부 Docker 네트워크 전용(expose)이라 외부 직접 접근 불가.
# host로 published 되는 서비스는 actuator 노출에 주의하거나 인증/방화벽으로 보호할 것.
management:
  endpoints:
    web:
      exposure:
        include: health, loggers, metrics
  endpoint:
    loggers:
      access: unrestricted # POST 레벨 변경 허용 (기본값이지만 명시)
  # APM(에이전트리스 OpenTelemetry) — Micrometer Observation 방식.
  # -javaagent 미사용 → Java 25(JEP 491)에서 Virtual Thread pinning 없음.
  tracing:
    # OTEL_ENABLED=false → 트레이싱 자체 비활성(관측성 미가동 시 export 시도/로그 노이즈 제거).
    # 이 경우에도 requestId(MdcLoggingFilter)는 유지되어 로그 상관관계는 가능하다.
    enabled: ${OTEL_ENABLED:true}
    sampling:
      probability: ${OTLP_TRACE_SAMPLING:1.0} # 운영은 0.1 등으로 하향(환경변수 주입)
  # 트레이스 OTLP 익스포터 — Boot 4.0 속성 경로(management.opentelemetry.tracing.export.otlp.*)
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces} # → Alloy OTLP 리시버
  otlp:
    metrics:
      export:
        enabled: ${OTEL_ENABLED:true} # 메트릭 OTLP push 토글
        url: ${OTLP_METRICS_ENDPOINT:http://localhost:4318/v1/metrics}
        step: 30s # 메트릭 push 주기

hig:
  bulkhead:
    database-name: orderDatabase # resilience4j.bulkhead.instances 이름과 반드시 일치해야 함

resilience4j:
  bulkhead:
    instances:
      orderDatabase: # 벌크헤드 이름
        maxConcurrentCalls: 19 # 동시에 허용할 최대 호출 수 (세마포어 개수 1개는 여유분)
        maxWaitDuration: 200ms # 진입을 위해 기다릴 최대 시간 (초과 시 에러)

rest:
  service:
    apply-patterns: /api/**

# 내부 서비스 URL — 운영환경 Docker 컨테이너명 기준
services:
  stop:
    url: ${STOP_SERVICE_URL:http://msa-stop:8182}
  reservation:
    url: ${RESERVATION_SERVICE_URL:http://msa-reservation:8183}

springdoc:
  api-docs:
    path: /api-docs # OpenAPI JSON 문서 경로
  swagger-ui:
    path: /swagger-ui.html # Swagger UI 접속 경로
    groups-order: DESC # 그룹 표시 순서
    operations-sorter: method # API 정렬 기준 (method, alpha 등)
    disable-swagger-default-url: true # 기본 petstore URL 비활성화
    display-request-duration: true # API 응답 시간 표시
  show-actuator: true # Actuator 엔드포인트도 문서화할지 여부

# JWT 설정
# 운영 환경에서는 반드시 AWS Secrets Manager 또는 환경변수로 주입해야 합니다.
jwt:
  secret: ${JWT_SECRET}

# Cookie 설정
# 운영 환경(HTTPS)에서는 COOKIE_SECURE=true 환경변수로 주입해야 합니다.
cookie:
  secure: ${COOKIE_SECURE:false}
