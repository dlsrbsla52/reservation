# 테스트 환경 전용 설정
# @DataJpaTest는 기본적으로 DataSource를 자동 교체(AutoConfigureTestDatabase)하므로
# replace: none 으로 비활성화하여 아래에서 직접 설정한 H2 PostgreSQL 호환 모드 URL을 사용하게 합니다.
# TIMESTAMPTZ, CREATE SCHEMA 등 PostgreSQL 전용 문법을 H2에서 처리하기 위함입니다.
spring:
  test:
    database:
      replace: none
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.xml