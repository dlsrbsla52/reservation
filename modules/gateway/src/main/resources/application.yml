server:
  port: 8080

spring:
  application:
    name: gateway-service
  main:
    web-application-type: reactive
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      # CORS 설정 — withCredentials: true 사용 시 allowedOrigins에 * 와일드카드 불가
      # 운영 도메인은 CORS_ALLOWED_ORIGIN 환경변수로 주입합니다.
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "${CORS_ALLOWED_ORIGIN}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: iam-service
          uri: http://iam-service:8181
          predicates:
            - Path=/api/v1/auth/**, /api/v1/member/**, /api/v1/admin/**
        - id: stop-service
          uri: http://stop-service:8182
          predicates:
            - Path=/api/v1/stop/**
        - id: reservation-service
          uri: http://reservation-service:8183
          predicates:
            - Path=/api/v1/reservation/**, /api/v1/contract/**

hig:
  bulkhead:
    database-name: orderDatabase # 사용하지 않지만 공통설정으로 인한 추가 설정

# JWT 설정 (auth 서비스와 동일한 secret을 사용해야 합니다)
# 운영 환경에서는 반드시 AWS Secrets Manager 또는 환경변수로 주입해야 합니다.
jwt:
  secret: ${JWT_SECRET}

rest:
  service:
    apply-patterns: /health-check