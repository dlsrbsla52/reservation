server:
  port: 8080

spring:
  application:
    name: gateway-service
  main:
    web-application-type: reactive
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      # Spring Cloud Gateway 5.x (spring-cloud-starter-gateway-server-webflux)
      # GatewayProperties prefix 변경: spring.cloud.gateway → spring.cloud.gateway.server.webflux
      server:
        webflux:
          # CORS 설정 — withCredentials: true 사용 시 allowedOrigins에 * 와일드카드 불가
          # 운영 도메인은 CORS_ALLOWED_ORIGIN 환경변수로 주입합니다.
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "${CORS_ALLOWED_ORIGIN}"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true
                maxAge: 3600
          routes:
            # internal 경로 차단 — 게이트웨이 외부에서 내부 전용 API 호출 방지
            - id: block-member-internal
              uri: no://op
              predicates:
                - Path=/api/v1/member/internal/**
              filters:
                - SetStatus=403

            - id: iam-service
              uri: ${IAM_SERVICE_URL:http://localhost:8181}
              predicates:
                - Path=/api/v1/auth/**, /api/v1/admin/**, /api/v1/member/**

            - id: stop-service
              uri: ${STOP_SERVICE_URL:http://localhost:8182}
              predicates:
                - Path=/api/v1/stop/**

            - id: reservation-service
              uri: ${RESERVATION_SERVICE_URL:http://localhost:8183}
              predicates:
                - Path=/api/v1/reservation/**, /api/v1/contract/**

hig:
  bulkhead:
    database-name: orderDatabase # 사용하지 않지만 공통설정으로 인한 추가 설정

# JWT 설정 (auth 서비스와 동일한 secret을 사용해야 합니다)
# 운영 환경에서는 반드시 AWS Secrets Manager 또는 환경변수로 주입해야 합니다.
jwt:
  secret: ${JWT_SECRET}

rest:
  service:
    apply-patterns: /health-check

# APM(에이전트리스 OpenTelemetry) — WebFlux(Netty)에서도 Micrometer Observation으로 서버 span 생성.
# 게이트웨이가 트레이스 진입점 → traceparent 헤더로 하위 서비스에 컨텍스트 전파(분산 트레이스 연결).
# -javaagent 미사용 + Reactor 논블로킹 → Virtual Thread pinning 무관.
management:
  endpoints:
    web:
      exposure:
        include: health, metrics
  tracing:
    enabled: ${OTEL_ENABLED:true} # 관측성 미가동 시 false로 트레이싱/ export 비활성
    sampling:
      probability: ${OTLP_TRACE_SAMPLING:1.0} # 운영은 0.1 등으로 하향(환경변수 주입)
  # 트레이스 OTLP 익스포터 — Boot 4.0 속성 경로(management.opentelemetry.tracing.export.otlp.*)
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces} # → Alloy OTLP 리시버
  otlp:
    metrics:
      export:
        enabled: ${OTEL_ENABLED:true} # 메트릭 OTLP push 토글
        url: ${OTLP_METRICS_ENDPOINT:http://localhost:4318/v1/metrics}
        step: 30s # 메트릭 push 주기