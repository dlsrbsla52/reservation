server:
  port: 8080

spring:
  application:
    name: gateway-service
  main:
    web-application-type: reactive
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8181
          predicates:
            - Path=/api/v1/auth/**, /api/v1/member/**
        - id: stop-service
          uri: http://stop-service:8182
          predicates:
            - Path=/api/v1/stop/**
        - id: reservation-service
          uri: http://reservation-service:8183
          predicates:
            - Path=/api/v1/reservation/**

hig:
  bulkhead:
    database-name: orderDatabase # 사용하지 않지만 공통설정으로 인한 추가 설정

# JWT 설정 (auth 서비스와 동일한 secret을 사용해야 합니다)
# 운영 환경에서는 반드시 AWS Secrets Manager 또는 환경변수로 주입해야 합니다.
jwt:
  secret: ${JWT_SECRET:this-is-a-very-long-secret-key-for-hmac-sha256-algorithm-32chars}

rest:
  service:
    apply-patterns: /health-check