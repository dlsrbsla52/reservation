# Grafana Tempo — 분산 트레이스 백엔드 (monolithic 단일 프로세스 모드).
# 단일 EC2 저예산 운영을 전제로 로컬 파일시스템 스토리지만 사용한다(외부 S3 없음).
#
# 데이터 흐름: 앱(OTLP) → Alloy → Tempo(OTLP gRPC 4317) → 로컬 블록 저장
# metrics_generator가 트레이스로부터 RED 메트릭 + service-graph를 만들어 Prometheus로 remote_write 하여
# Grafana의 Service Graph / APM 대시보드를 가능하게 한다.

server:
  http_listen_port: 3200   # Grafana 쿼리 API
  grpc_listen_port: 9095   # Tempo 내부 gRPC

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317   # Alloy → Tempo (트레이스 수신)
        http:
          endpoint: 0.0.0.0:4318

ingester:
  # 단일 인스턴스이므로 블록을 자주 flush 해 조회 지연을 줄인다
  max_block_duration: 5m

compactor:
  compaction:
    # 트레이스 보존 기간 — 단일 호스트 디스크 보호를 위해 7일로 제한(필요 시 조정)
    block_retention: 168h

metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      # 생성된 span 메트릭/service-graph를 Prometheus로 전송(exemplar 포함 → 메트릭↔트레이스 연결)
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
  # 트레이스 처리 시 메트릭 생성 시 사용할 트레이스 임시 저장소
  traces_storage:
    path: /var/tempo/generator/traces

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal

overrides:
  defaults:
    metrics_generator:
      # span-metrics: 서비스/오퍼레이션별 RED(요청수·에러·지연) 메트릭
      # service-graphs: 서비스 간 호출 관계 그래프
      processors: [service-graphs, span-metrics]
