# Prometheus — 메트릭 백엔드.
# 앱 메트릭은 스크레이프(pull)가 아니라 OTLP push로 들어온다:
#   앱(micrometer-registry-otlp) → Alloy → prometheus.remote_write → Prometheus (/api/v1/write)
#   Tempo metrics_generator → Prometheus (/api/v1/write)
# 따라서 remote-write receiver를 활성화해야 하며(컨테이너 command의 --web.enable-remote-write-receiver),
# 아래 scrape_configs는 Prometheus 자체 상태 모니터링 용도만 둔다.

global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    cluster: bus-msa
    monitor: single-ec2

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
