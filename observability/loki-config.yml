# Loki 단일 바이너리(single-binary) 설정 — 단일 호스트/저예산 운영용.
# 라벨만 인덱싱하고 본문은 압축해 로컬 디스크에 저장하므로 메모리/비용 부담이 작다.
# 외부 오브젝트 스토리지(S3 등) 없이 filesystem 스토리지만 사용한다.
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # 로그 보존 기간 — 단일 호스트 디스크 보호를 위해 7일로 제한 (필요 시 조정)
  retention_period: 168h
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  # 라벨 카디널리티 폭주 방지 (requestId 같은 고유값은 라벨이 아니라 쿼리시 json 파싱으로 다룬다)
  max_label_names_per_series: 15

compactor:
  working_directory: /loki/compactor
  # retention_period 경과분을 실제 삭제하려면 compactor의 retention을 켜야 한다.
  retention_enabled: true
  delete_request_store: filesystem

# 단일 인스턴스이므로 분산 쿼리 스케줄러 없이 바로 처리
query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100
