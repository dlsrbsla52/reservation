# Grafana 기동 시 Tempo(트레이스) 데이터소스를 자동 등록.
# 트레이스 ↔ 로그(Loki) ↔ 메트릭(Prometheus) 상호 이동을 함께 설정한다.
apiVersion: 1

datasources:
  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      # 트레이스 → 로그: span의 service.name을 Loki의 service 라벨로 매핑해 해당 로그로 이동
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: '-1h'
        spanEndTimeShift: '1h'
        filterByTraceID: true
        filterBySpanID: false
        tags:
          - key: 'service.name'
            value: 'service'
      # 트레이스 → 메트릭: service-graph/span 메트릭(Prometheus)으로 이동
      tracesToMetrics:
        datasourceUid: prometheus
        tags:
          - key: 'service.name'
            value: 'service'
      # Tempo metrics_generator가 만든 service-graph를 시각화
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
      # 트레이스 검색 시 로그 데이터소스 연동
      lokiSearch:
        datasourceUid: loki
