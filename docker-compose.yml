# EC2 같은 단일 서버 배포용 compose.
# DB/Valkey/하위 서비스는 Docker 내부망에 두고, 외부 노출은 Gateway 및 별도 프론트 컨테이너로 제한한다.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

x-app-common: &app-common
  restart: unless-stopped
  logging: *default-logging
  environment: &app-env
    DB_HOST: database
    DB_PORT: 5432
    DB_NAME: ${POSTGRES_DB:-default}
    DB_USERNAME: ${POSTGRES_USER:-postgres}
    DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    JWT_SECRET: ${JWT_SECRET:-this-is-a-very-long-secret-key-for-hmac-sha256-algorithm-32chars}
    REDIS_HOST: valkey
    REDIS_PORT: 6379
    COOKIE_SECURE: ${COOKIE_SECURE:-false}
    CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN:-http://localhost:3000}
    IAM_SERVICE_URL: http://iam-service:8181
    STOP_SERVICE_URL: http://stop-service:8182
    RESERVATION_SERVICE_URL: http://reservation-service:8183

services:
  database:
    image: postgres:18.3
    container_name: msa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-default}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging

  valkey:
    image: valkey/valkey:8.1.6
    container_name: msa-valkey
    restart: unless-stopped
    command: ["valkey-server", "--appendonly", "yes"]
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    logging: *default-logging

  iam-service:
    <<: *app-common
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: iam
    container_name: msa-iam
    expose:
      - "8181"
    depends_on:
      database:
        condition: service_healthy
      valkey:
        condition: service_healthy

  stop-service:
    <<: *app-common
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: stop
    container_name: msa-stop
    expose:
      - "8182"
    depends_on:
      database:
        condition: service_healthy

  reservation-service:
    <<: *app-common
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: reservation
    container_name: msa-reservation
    expose:
      - "8183"
    depends_on:
      database:
        condition: service_healthy

  gateway-service:
    <<: *app-common
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: gateway
    container_name: msa-gateway
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    depends_on:
      valkey:
        condition: service_healthy
      iam-service:
        condition: service_started
      stop-service:
        condition: service_started
      reservation-service:
        condition: service_started

volumes:
  postgres_data:
  valkey_data:
