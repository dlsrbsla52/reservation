# EC2 같은 단일 서버 배포용 compose.
# DB/Valkey/하위 서비스는 Docker 내부망에 두고, 외부 노출은 Gateway/Grafana 및 별도 프론트 컨테이너로 제한한다.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

x-app-common: &app-common
  restart: unless-stopped
  logging: *default-logging
  environment: &app-env
    DB_HOST: database
    DB_PORT: 5432
    DB_NAME: ${POSTGRES_DB:-default}
    DB_USERNAME: ${POSTGRES_USER:-postgres}
    DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    JWT_SECRET: ${JWT_SECRET:-this-is-a-very-long-secret-key-for-hmac-sha256-algorithm-32chars}
    REDIS_HOST: valkey
    REDIS_PORT: 6379
    COOKIE_SECURE: ${COOKIE_SECURE:-false}
    CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN:-http://localhost:3000}
    IAM_SERVICE_URL: http://iam-service:8181
    STOP_SERVICE_URL: http://stop-service:8182
    RESERVATION_SERVICE_URL: http://reservation-service:8183

services:
  database:
    image: postgres:18.3
    container_name: msa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-default}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging

  valkey:
    image: valkey/valkey:8.1.6
    container_name: msa-valkey
    restart: unless-stopped
    command: ["valkey-server", "--appendonly", "yes"]
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    logging: *default-logging

  iam-service:
    <<: *app-common
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: iam
    container_name: msa-iam
    expose:
      - "8181"
    depends_on:
      database:
        condition: service_healthy
      valkey:
        condition: service_healthy

  stop-service:
    <<: *app-common
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: stop
    container_name: msa-stop
    expose:
      - "8182"
    depends_on:
      database:
        condition: service_healthy

  reservation-service:
    <<: *app-common
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: reservation
    container_name: msa-reservation
    expose:
      - "8183"
    depends_on:
      database:
        condition: service_healthy

  gateway-service:
    <<: *app-common
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: gateway
    container_name: msa-gateway
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    depends_on:
      valkey:
        condition: service_healthy
      iam-service:
        condition: service_started
      stop-service:
        condition: service_started
      reservation-service:
        condition: service_started

  loki:
    image: grafana/loki:3.0.0
    container_name: msa-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./observability/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    expose:
      - "3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 -O- http://localhost:3100/ready | grep -q ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging

  alloy:
    image: grafana/alloy:v1.16.3
    container_name: msa-alloy
    restart: unless-stopped
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy_data:/var/lib/alloy/data
    depends_on:
      loki:
        condition: service_healthy
    logging: *default-logging

  grafana:
    image: grafana/grafana:11.0.0
    container_name: msa-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3300}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-}
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy
    logging: *default-logging

volumes:
  postgres_data:
  valkey_data:
  loki_data:
  grafana_data:
  alloy_data:
