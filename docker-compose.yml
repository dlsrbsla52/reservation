# 모든 컨테이너 공통 로그 로테이션 — 단일 호스트에서 디스크 풀(full) 방지의 핵심.
# json-file 드라이버로 컨테이너당 최대 50MB×5개(=250MB)까지만 보관하고 순환 삭제한다.
# (Alloy가 이 stdout 로그를 수집해 Loki로 보내므로, 호스트 파일은 단기 버퍼 역할만)
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:
#  운영 환경에선 실제 데이터베이스 사용
#  database:
#    image: postgres:18.3
#    container_name: msa-postgres
#    environment:
#      POSTGRES_USER: postgres
#      POSTGRES_PASSWORD: postgres
#      POSTGRES_DB: default
#      POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --lc-collate=C --lc-ctype=C'
#    ports:
#      - "15433:5432"
#    volumes:
#      - postgres_data:/var/lib/postgresql
#    healthcheck:
#      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
#      interval: 5s
#      timeout: 5s
#      retries: 5

  # Valkey: Redis 라이선스 변경(BSL) 이후 AWS, GCP, Oracle 등이 Linux Foundation에
  # 기여하여 만든 완전 오픈소스(BSD-3-Clause) Redis 포크.
  # Redis API와 100% 호환되므로 기존 Spring Data Redis 설정 변경 불필요.
  valkey:
    image: valkey/valkey:8.1.6
    container_name: msa-valkey
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "valkey-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    logging: *default-logging

  iam-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: iam
    container_name: msa-iam
    expose:
      - "8181"
    depends_on:
      database:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://database:5432/default
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - REDIS_HOST=valkey
      - JWT_SECRET=this-is-a-very-long-secret-key-for-hmac-sha256-algorithm-32chars
    logging: *default-logging

  stop-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: stop
    container_name: msa-stop
    ports:
      - "8182:8182"
    depends_on:
      database:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://database:5432/default
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    logging: *default-logging

  reservation-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: reservation
    container_name: msa-reservation
    expose:
      - "8183"
    depends_on:
      database:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://database:5432/default
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    logging: *default-logging

  gateway-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: gateway
    container_name: msa-gateway
    ports:
      - "8080:8080"
    depends_on:
      - iam-service
      - reservation-service
    environment:
      - REDIS_HOST=valkey
      - JWT_SECRET=this-is-a-very-long-secret-key-for-hmac-sha256-algorithm-32chars
    logging: *default-logging

  # ───────────────────────── 관측(로그) 스택 ─────────────────────────
  # 단일 호스트·저예산용 셀프호스팅 로그 파이프라인: Alloy(수집) → Loki(저장) → Grafana(조회).
  # 외부 SaaS 비용 0. 앱 컨테이너의 JSON stdout 로그를 requestId/traceId로 묶어 검색한다.

  # Loki: 라벨만 인덱싱하는 경량 로그 저장소 (로컬 디스크, 7일 보존)
  loki:
    image: grafana/loki:3.0.0
    container_name: msa-loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./observability/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    expose:
      - "3100"
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --tries=1 -O- http://localhost:3100/ready | grep -q ready || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging

  # Alloy: Docker 소켓으로 컨테이너 로그를 수집해 Loki로 전송 (Promtail 후속)
  alloy:
    image: grafana/alloy:v1.16.3
    container_name: msa-alloy
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      # 컨테이너 자동 발견 및 로그 tail 을 위해 Docker 소켓을 읽기 전용 마운트
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy_data:/var/lib/alloy/data
    depends_on:
      loki:
        condition: service_healthy
    logging: *default-logging

  # Grafana: 로그 조회 UI. http://<host>:3300 (기본 계정 admin / ${GRAFANA_PASSWORD:-admin})
  # 호스트 3300 → 컨테이너 3000. (3000은 Next.js 등과 충돌하기 쉬워 호스트 포트만 3300으로 노출)
  grafana:
    image: grafana/grafana:11.0.0
    container_name: msa-grafana
    ports:
      - "3300:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
    logging: *default-logging

volumes:
  postgres_data:
  loki_data:
  grafana_data:
  alloy_data:
