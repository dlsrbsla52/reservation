#      POSTGRES_USER: postgres
#      POSTGRES_PASSWORD: postgres
#      POSTGRES_DB: default
#      POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --lc-collate=C --lc-ctype=C'
#    ports:
#      - "15433:5432"
#    volumes:
#      - postgres_data:/var/lib/postgresql
#    healthcheck:
#      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
#      interval: 5s
#      timeout: 5s
#      retries: 5

  # Valkey: Redis 라이선스 변경(BSL) 이후 AWS, GCP, Oracle 등이 Linux Foundation에
  # 기여하여 만든 완전 오픈소스(BSD-3-Clause) Redis 포크.
  # Redis API와 100% 호환되므로 기존 Spring Data Redis 설정 변경 불필요.
  valkey:
    image: valkey/valkey:8.1.6
    container_name: msa-valkey
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "valkey-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: auth
    container_name: msa-auth
    expose:
      - "8181"
    depends_on:
      database:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://database:5432/default
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - REDIS_HOST=valkey
      - JWT_SECRET=this-is-a-very-long-secret-key-for-hmac-sha256-algorithm-32chars

  reservation-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: reservation
    container_name: msa-reservation
    expose:
      - "8183"
    depends_on:
      database:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://database:5432/default
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update

  gateway-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: gateway
    container_name: msa-gateway
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - member-service
      - reservation-service
    environment:
      - REDIS_HOST=valkey
      - JWT_SECRET=this-is-a-very-long-secret-key-for-hmac-sha256-algorithm-32chars

volumes:
  postgres_data:
