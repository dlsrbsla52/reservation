# EC2 같은 단일 서버 배포용 compose.
# DB/Valkey/하위 서비스는 Docker 내부망에 두고, 외부 노출은 Gateway/Grafana 및 별도 프론트 컨테이너로 제한한다.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

x-app-common: &app-common
  restart: unless-stopped
  logging: *default-logging
  # 컨테이너 메모리 상한 — 단일 EC2에서 한 서비스가 호스트를 잠식하지 못하도록 캡.
  # (docker compose v2는 deploy.resources.limits.memory를 up에도 적용)
  deploy:
    resources:
      limits:
        memory: 768M # heap는 MaxRAMPercentage=75 → 약 560M, 나머지는 metaspace/thread/direct
  environment: &app-env
    # 컨테이너 메모리의 75%를 힙 상한으로 (고정 -Xmx 대신 컨테이너 인지 방식)
    JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0"
    DB_HOST: database
    DB_PORT: 5432
    DB_NAME: ${POSTGRES_DB:-default}
    DB_USERNAME: ${POSTGRES_USER:-postgres}
    DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    JWT_SECRET: ${JWT_SECRET:-this-is-a-very-long-secret-key-for-hmac-sha256-algorithm-32chars}
    REDIS_HOST: valkey
    REDIS_PORT: 6379
    COOKIE_SECURE: ${COOKIE_SECURE:-false}
    CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN:-http://localhost:3000}
    IAM_SERVICE_URL: http://iam-service:8181
    STOP_SERVICE_URL: http://stop-service:8182
    RESERVATION_SERVICE_URL: http://reservation-service:8183
    # APM(OTLP) — 앱이 트레이스/메트릭을 Alloy로 push. Alloy가 Tempo/Prometheus로 팬아웃.
    OTLP_TRACES_ENDPOINT: http://alloy:4318/v1/traces
    OTLP_METRICS_ENDPOINT: http://alloy:4318/v1/metrics
    # 운영 샘플링 비율 — 성능/비용을 위해 기본 10%. 전량 수집이 필요하면 1.0으로 override.
    OTLP_TRACE_SAMPLING: ${OTLP_TRACE_SAMPLING:-0.1}
    # 관측성 스택을 띄우지 않는 lean 배포에서는 .env에 OTEL_ENABLED=false로 두어 export 시도를 끈다.
    OTEL_ENABLED: ${OTEL_ENABLED:-true}

services:
  database:
    image: postgres:18.3
    container_name: msa-postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1024M # PostgreSQL — shared_buffers/커넥션 고려 (프로드는 Aurora 권장)
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-default}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging

  valkey:
    image: valkey/valkey:8.1.6
    container_name: msa-valkey
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    command: ["valkey-server", "--appendonly", "yes"]
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    logging: *default-logging

  iam-service:
    <<: *app-common
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: iam
    container_name: msa-iam
    expose:
      - "8181"
    depends_on:
      database:
        condition: service_healthy
      valkey:
        condition: service_healthy

  stop-service:
    <<: *app-common
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: stop
    container_name: msa-stop
    expose:
      - "8182"
    depends_on:
      database:
        condition: service_healthy

  reservation-service:
    <<: *app-common
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: reservation
    container_name: msa-reservation
    expose:
      - "8183"
    depends_on:
      database:
        condition: service_healthy

  gateway-service:
    <<: *app-common
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE_NAME: gateway
    container_name: msa-gateway
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    depends_on:
      valkey:
        condition: service_healthy
      iam-service:
        condition: service_started
      stop-service:
        condition: service_started
      reservation-service:
        condition: service_started

  loki:
    image: grafana/loki:3.0.0
    container_name: msa-loki
    # 관측성 스택은 opt-in — 기본 `up`에서는 뜨지 않는다. 켜기: --profile observability
    profiles: ["observability"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./observability/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    expose:
      - "3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 -O- http://localhost:3100/ready | grep -q ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging

  # 분산 트레이스 백엔드 (monolithic). 앱 OTLP → Alloy → Tempo.
  tempo:
    image: grafana/tempo:2.7.0
    container_name: msa-tempo
    profiles: ["observability"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768M
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    expose:
      - "3200" # Grafana 쿼리 API
      - "4317" # OTLP gRPC (Alloy → Tempo)
    depends_on:
      prometheus:
        condition: service_started
    logging: *default-logging

  # 메트릭 백엔드. remote-write receiver로 Alloy/Tempo가 push한 메트릭 수신.
  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: msa-prometheus
    profiles: ["observability"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768M
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver # OTLP push 경로(/api/v1/write) 활성화
      - --enable-feature=exemplar-storage # 메트릭↔트레이스 exemplar 연결
      - --storage.tsdb.retention.time=7d # 단일 호스트 디스크 보호 (7일 보존)
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    expose:
      - "9090"
    logging: *default-logging

  alloy:
    image: grafana/alloy:v1.16.3
    container_name: msa-alloy
    profiles: ["observability"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy_data:/var/lib/alloy/data
    expose:
      - "4317" # OTLP gRPC (앱 → Alloy)
      - "4318" # OTLP HTTP (앱 → Alloy)
    # tempo/prometheus는 하드 의존에서 제외 — 미기동 시 OTLP export만 재시도(무해).
    # 덕분에 "로그만" 부분 기동(up -d loki alloy grafana)이 트레이스/메트릭 백엔드를 끌어오지 않는다.
    depends_on:
      loki:
        condition: service_healthy
    logging: *default-logging

  grafana:
    image: grafana/grafana:11.0.0
    container_name: msa-grafana
    profiles: ["observability"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    ports:
      - "${GRAFANA_PORT:-3300}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-}
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    # 백엔드가 없어도 Grafana는 기동됨(데이터소스만 unreachable 표시) → 하드 의존 최소화
    depends_on:
      loki:
        condition: service_healthy
    logging: *default-logging

volumes:
  postgres_data:
  valkey_data:
  loki_data:
  grafana_data:
  alloy_data:
  tempo_data:
  prometheus_data:
